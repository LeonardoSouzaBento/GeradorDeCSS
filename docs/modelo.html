<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo</title>
    <style>
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 500;
        line-height: 1;
        color: #fff;
        background-color: #0b5bcb;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        border: none;
      }
    </style>
  </head>
  <body>
    <button>
      Botão normal
    </button>
    <button style="border: 2px solid #cb0b0b;">
      Botão com outline
    </button>
  </body>
</html>
